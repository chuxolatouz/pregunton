<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pregunton social preview</title>
  <desc id="desc">Vista previa social de Pregunton con una carta de papel y el imagotipo.</desc>
  <rect width="1200" height="630" fill="#F6EFE2"/>
