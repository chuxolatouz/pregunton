  <text x="222" y="430" fill="#2E211B" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" letter-spacing="0">Es una excusa para conversar.</text>
  <text x="224" y="488" fill="#665246" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="1.6">MAZOS DE PREGUNTAS EN ESPAÑOL</text>
